# prompts/classify_document.yaml
# --------------------------------
# Prompt template for the classify_document node.
#
# Why a YAML file instead of an inline Python string?
#   Prompts change frequently during development and evaluation -- wording,
#   examples, output format. Keeping them in YAML means you can edit the
#   prompt without touching any Python file, and you can version-control
#   prompt changes separately from logic changes. This is also the pattern
#   used by LangChain's PromptTemplate and LangSmith's prompt hub.
#
# Variables injected by classifier.py at runtime (surrounded by { }):
#   {document_type_options}  -- comma-separated list from config.DOCUMENT_TYPES
#   {preamble_text}          -- first ~2 pages of the document's full_text

version: "1.0"

system: |
  You are a legal document classification expert. Your job is to read the
  opening section of a legal document and determine what type of document it is.

  You must respond with valid JSON and nothing else -- no markdown, no
  explanation outside the JSON object.

user: |
  Classify the following legal document excerpt.

  Document excerpt (first ~2 pages):
  ---
  {preamble_text}
  ---

  Determine the document type. The only valid values are:
  {document_type_options}

  Definitions:
  - NDA: A Non-Disclosure Agreement. The primary purpose is to protect
    confidential information shared between parties.
  - Contract: A general service agreement, vendor agreement, employment
    contract, supply agreement, or any binding agreement that is NOT
    primarily an NDA or an amendment.
  - Amendment: A document that modifies, supplements, or amends a previously
    signed agreement. Look for phrases like "Amendment No. 1", "this
    Amendment", "hereby amends", "as amended by".
  - Other: Cannot be classified as any of the above (e.g., a court filing,
    letter of intent, term sheet without binding clauses).

  Respond with this exact JSON structure:
  {{
    "document_type": "<one of: NDA, Contract, Amendment, Other>",
    "confidence": <float between 0.0 and 1.0>,
    "reasoning": "<one sentence explaining the key signal that led to this classification>"
  }}

  Rules:
  - confidence must be a number, not a string.
  - reasoning must be one sentence maximum.
  - If you are genuinely unsure between two types, pick the more specific one
    and set confidence below 0.7.
  - Never return a document_type value that is not in the allowed list.
